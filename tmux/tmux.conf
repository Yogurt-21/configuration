#My tmux configuration

set -g base-index 1
setw -g pane-base-index 1

unbind C-r
unbind -n C-r
#bind -n C-r send-keys "gcc -o a ~/coding/Projects/Xlib/winAnimation.c -lX11" Enter


unbind C-l
unbind -n C-l
#bind -n C-l send-keys "clear" Enter

#tmux auto-saved sessions

set -g @continuum-boot on

set -g @continuum-boot-options 'alacritty'

#In order for tmux to support 256-color in my terminal

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on 
set -g set-clipboard on

#set my master key(Crtl+x)
unbind C-b
set -g prefix C-x
bind C-x send-prefix

unbind %
unbind '"'

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

#this is the keybindings for selecting panes

setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#alt

bind -n M-x kill-window
bind -n M-c new-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-n send-keys "./compiler" Enter
bind -n M-d send-keys "./debugger" Enter

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-1 select-window -t 1

unbind r 
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"


set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-interval 2

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

